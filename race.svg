<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" role="img" aria-labelledby="title desc">
  <title id="title">龟兔赛跑动画</title>
  <desc id="desc">兔子和乌龟在赛道上奔跑，兔子中途睡觉，乌龟坚持前进并率先到达终点。</desc>

  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#b8ecff"/>
      <stop offset="100%" stop-color="#eaf9ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8dcf62"/>
      <stop offset="100%" stop-color="#5ea23e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <style>
      .label { font: 700 26px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #2d2d2d; }
      .small { font: 600 17px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #2d2d2d; }
      .finishText { font: 700 24px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #d34242; opacity: 0; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="500" fill="url(#sky)"/>
  <circle cx="860" cy="95" r="46" fill="#ffe17a" opacity="0.9"/>
  <rect y="290" width="1000" height="210" fill="url(#ground)"/>

  <!-- 跑道 -->
  <rect x="60" y="330" width="880" height="110" rx="16" fill="#d0ae7e"/>
  <g stroke="#fff8df" stroke-width="4" stroke-dasharray="22 18" opacity="0.75">
    <line x1="70" y1="380" x2="930" y2="380"/>
  </g>

  <!-- 起点和终点 -->
  <g>
    <line x1="110" y1="320" x2="110" y2="450" stroke="#333" stroke-width="6"/>
    <text x="92" y="305" class="small">起点</text>
  </g>
  <g>
    <line x1="860" y1="320" x2="860" y2="450" stroke="#333" stroke-width="6"/>
    <rect x="860" y="320" width="80" height="130" fill="#f4f4f4"/>
    <g fill="#2e2e2e">
      <rect x="860" y="320" width="40" height="22"/>
      <rect x="900" y="342" width="40" height="22"/>
      <rect x="860" y="364" width="40" height="22"/>
      <rect x="900" y="386" width="40" height="22"/>
      <rect x="860" y="408" width="40" height="22"/>
      <rect x="900" y="430" width="40" height="20"/>
    </g>
    <text x="865" y="305" class="small">终点</text>
  </g>

  <!-- 兔子 -->
  <g id="rabbit" transform="translate(120 350)" filter="url(#shadow)">
    <!-- 身体 -->
    <ellipse cx="55" cy="30" rx="45" ry="28" fill="#f8f8f8" stroke="#d9d9d9" stroke-width="2"/>
    <!-- 头 -->
    <circle cx="95" cy="15" r="20" fill="#ffffff" stroke="#d9d9d9" stroke-width="2"/>
    <!-- 耳朵 -->
    <ellipse cx="86" cy="-18" rx="7" ry="22" fill="#fff" stroke="#d9d9d9" stroke-width="2"/>
    <ellipse cx="102" cy="-20" rx="7" ry="24" fill="#fff" stroke="#d9d9d9" stroke-width="2"/>
    <ellipse cx="86" cy="-18" rx="3" ry="15" fill="#ffb4c6"/>
    <ellipse cx="102" cy="-20" rx="3" ry="17" fill="#ffb4c6"/>
    <!-- 眼睛 -->
    <circle cx="101" cy="12" r="2.5" fill="#333"/>
    <!-- 鼻子 -->
    <circle cx="110" cy="20" r="2" fill="#f48aa0"/>
    <!-- 尾巴 -->
    <circle cx="15" cy="30" r="9" fill="#fff" stroke="#ddd" stroke-width="2"/>
    <!-- 腿 -->
    <ellipse cx="43" cy="53" rx="9" ry="6" fill="#fff" stroke="#d9d9d9" stroke-width="1.5"/>
    <ellipse cx="67" cy="53" rx="9" ry="6" fill="#fff" stroke="#d9d9d9" stroke-width="1.5"/>

    <!-- 奔跑上下抖动：前8秒 -->
    <animateTransform attributeName="transform" type="translate"
      values="120 350; 120 344; 120 350; 120 344; 120 350; 120 350"
      keyTimes="0; 0.1; 0.2; 0.3; 0.4; 1"
      dur="8s" repeatCount="1" fill="freeze"/>

    <!-- 兔子位移：先快跑到前面，后睡觉，最后再冲刺 -->
    <animateMotion dur="16s" repeatCount="indefinite" path="M0 0 L520 0 L520 0 L700 0" keyTimes="0;0.38;0.72;1" keySplines="0.4 0 0.6 1;0 0 1 1;0.35 0 0.65 1" calcMode="spline"/>

    <!-- 睡觉时旋转躺下 -->
    <animateTransform attributeName="transform" additive="sum" type="rotate"
      values="0 60 30; 18 60 30; 18 60 30; 0 60 30"
      keyTimes="0;0.45;0.72;1" dur="16s" repeatCount="indefinite"/>

    <!-- 睡觉 Zzz -->
    <text x="124" y="-12" class="small" opacity="0">Z
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.44;0.47;0.68;0.72;1" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-12;-12;-28;-40;-12" keyTimes="0;0.47;0.58;0.68;1" dur="16s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- 乌龟 -->
  <g id="turtle" transform="translate(120 395)" filter="url(#shadow)">
    <!-- 壳 -->
    <ellipse cx="70" cy="14" rx="48" ry="30" fill="#4a8f4e" stroke="#2e6532" stroke-width="3"/>
    <path d="M30 14 Q70 -8 110 14 Q70 34 30 14Z" fill="#67ad63" opacity="0.65"/>
    <!-- 头 -->
    <circle cx="122" cy="12" r="12" fill="#79b56e" stroke="#4f7d47" stroke-width="2"/>
    <circle cx="126" cy="10" r="2.2" fill="#1f311d"/>
    <!-- 腿 -->
    <ellipse cx="45" cy="40" rx="10" ry="6" fill="#79b56e"/>
    <ellipse cx="92" cy="40" rx="10" ry="6" fill="#79b56e"/>
    <ellipse cx="34" cy="20" rx="8" ry="5" fill="#79b56e"/>
    <ellipse cx="101" cy="20" rx="8" ry="5" fill="#79b56e"/>

    <!-- 稳定前进，略慢但不停 -->
    <animateMotion dur="16s" repeatCount="indefinite" path="M0 0 L740 0"/>
    <!-- 小幅起伏表示爬行 -->
    <animateTransform attributeName="transform" additive="sum" type="translate"
      values="0 0; 0 -2; 0 0; 0 -2; 0 0"
      keyTimes="0;0.25;0.5;0.75;1" dur="1.2s" repeatCount="indefinite"/>
  </g>

  <!-- 标题和结果 -->
  <text x="500" y="58" text-anchor="middle" class="label">龟兔赛跑</text>
  <text x="500" y="88" text-anchor="middle" class="small">兔子先快后睡，乌龟坚持到底</text>

  <text x="500" y="140" text-anchor="middle" class="finishText">乌龟获胜！
    <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.7;0.78;0.82;0.96;1" dur="16s" repeatCount="indefinite"/>
  </text>
</svg>
